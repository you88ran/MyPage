<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠游导航</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="toast.css">
</head>
<body>
    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 确认对话框 -->
    <div id="confirmDialog" class="confirm-dialog">
        <div class="confirm-content">
            <div class="confirm-title"></div>
            <div class="confirm-message"></div>
            <div class="confirm-buttons">
                <button class="confirm-button confirm-cancel">取消</button>
                <button class="confirm-button confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 目录导航 -->
        <div class="nav-sidebar" id="navSidebar">
            <div class="nav-title" id="navToggle" onclick="toggleNav()">
                悠游导航
                <i class="fas fa-chevron-up nav-toggle-icon" id="navToggleIcon"></i>
            </div>
            <div id="groupNav" class="nav-list"></div>
        </div>

        <!-- 拖拽分隔线 -->
        <div class="sidebar-resizer" id="sidebarResizer"></div>

        <!-- 主要内容区 -->
        <div class="main-content">
            <div class="page-header">
                <!-- 搜索栏和管理员按钮 -->
                <div class="header">
                    <form class="search-form" onsubmit="handleSearch(event)">
                        <div class="search-bar">
                            <div class="search-icon">
                                <i class="fas fa-search"></i>
                            </div>
                            <input type="text" id="searchInput" placeholder="搜索...">
                            <select id="searchEngine">
                                <option value="baidu">百度</option>
                                <option value="google">Google</option>
                                <option value="bing">Bing</option>
                            </select>
                        </div>
                    </form>
                    <div class="header-actions">
                        <a href="https://github.com/yvyan/MyPage" 
                           target="_blank" 
                           class="github-link" 
                           title="查看源码">
                            <i class="fab fa-github"></i>
                        </a>
                        <div id="adminButton">
                            <button class="admin-button" onclick="openAdminModal()">
                                <i class="fas fa-user-lock"></i>
                                管理员登录
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 导航内容 -->
            <div id="navigation" class="navigation">
                <div class="loading">
                    <div class="loading-wave">
                        <div></div>
                        <div></div>
                    </div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理员登录模态框 -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAdminModal()"></span>
            <h2>管理员登录</h2>
            <form id="adminForm" onsubmit="handleLogin(event)">
                <input type="password" id="adminPassword" placeholder="请输入管理员密码" required>
                <button type="submit">登录</button>
            </form>
        </div>
    </div>

    <!-- 管理链接模态框 -->
    <div id="linkModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLinkModal()"></span>
            <h2>管理链接</h2>
            <form id="linkForm" onsubmit="handleLinkSubmit(event)">
                <input type="url" id="linkUrl" placeholder="链接地址" required>
                <input type="text" id="linkName" placeholder="链接名称" required>
                <input type="text" id="linkLogo" placeholder="图标地址">
                <textarea id="linkDescription" placeholder="链接描述"></textarea>
                <select id="linkGroup" required>
                    <option value="">选择分组...</option>
                </select>
                <button type="submit">保存</button>
            </form>
        </div>
    </div>

    <!-- 管理分组模态框 -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGroupModal()"></span>
            <h2>管理分组</h2>
            <form id="groupForm" onsubmit="handleGroupSubmit(event)">
                <input type="text" id="groupName" placeholder="分组名称" required>
                <label>
                    <input type="checkbox" id="groupPrivate">
                    私密分组
                </label>
                <button type="submit">保存</button>
            </form>
        </div>
    </div>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">
        <i class="fas fa-chevron-up"></i>
    </button>

    <!-- 手机端固定顶栏 -->
    <div class="mobile-fixed-header" id="mobileFixedHeader" style="display:none;">
        <form class="search-form" onsubmit="handleSearch(event)">
            <div class="search-bar">
                <div class="search-icon"><i class="fas fa-search"></i></div>
                <input type="text" id="searchInputMobile" placeholder="搜索...">
                <select id="searchEngineMobile">
                    <option value="baidu">百度</option>
                    <option value="google">Google</option>
                    <option value="bing">Bing</option>
                </select>
            </div>
        </form>
        <div class="mobile-header-row2">
            <button class="mobile-nav-btn" id="mobileNavBtn" onclick="toggleMobileDropdown()">
                <i class="fas fa-list"></i> 悠游导航 <i class="fas fa-chevron-down" id="mobileDropdownIcon"></i>
            </button>
            <div class="header-actions">
                <div id="adminButtonMobile"></div>
            </div>
        </div>
    </div>

    <!-- 手机端目录下拉面板 -->
    <div class="mobile-nav-dropdown" id="mobileNavDropdown"></div>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
        // ===== 回到顶部 =====
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });

        // ===== 桌面端侧边栏折叠 =====
        let navCollapsed = false;
        function toggleNav() {
            navCollapsed = !navCollapsed;
            const list = document.getElementById('groupNav');
            const icon = document.getElementById('navToggleIcon');
            if (navCollapsed) {
                list.style.display = 'none';
                icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            } else {
                list.style.display = 'flex';
                icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            }
        }

        // ===== 手机端固定顶栏 =====
        const mobileFixedHeader = document.getElementById('mobileFixedHeader');
        const isMobile = () => window.innerWidth <= 768;

        function initMobileHeader() {
            if (isMobile()) {
                mobileFixedHeader.style.display = 'block';
                // 同步搜索引擎选择
                const engine = localStorage.getItem('preferred_search_engine') || 'bing';
                document.getElementById('searchEngineMobile').value = engine;
                // 撑开内容区，避免被固定顶栏遮挡
                const h = mobileFixedHeader.offsetHeight;
                document.querySelector('.container').style.paddingTop = (h + 10) + 'px';
                // 目录下拉面板 top
                document.getElementById('mobileNavDropdown').style.top = h + 'px';
                // 同步管理员按钮
                syncMobileAdminButton();
            } else {
                mobileFixedHeader.style.display = 'none';
                document.querySelector('.container').style.paddingTop = '';
            }
        }

        // 手机端搜索表单提交（复用桌面端 handleSearch，但读取手机端输入框）
        document.querySelector('.mobile-fixed-header .search-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const SEARCH_ENGINES = {
                baidu: 'https://www.baidu.com/s?wd=',
                google: 'https://www.google.com/search?q=',
                bing: 'https://www.bing.com/search?q='
            };
            const q = document.getElementById('searchInputMobile').value.trim();
            const eng = document.getElementById('searchEngineMobile').value;
            if (q) window.open(SEARCH_ENGINES[eng] + encodeURIComponent(q), '_blank');
            localStorage.setItem('preferred_search_engine', eng);
        });

        // 手机端目录下拉
        let mobileDropdownOpen = false;
        function toggleMobileDropdown() {
            mobileDropdownOpen = !mobileDropdownOpen;
            const dropdown = document.getElementById('mobileNavDropdown');
            const btn = document.getElementById('mobileNavBtn');
            const icon = document.getElementById('mobileDropdownIcon');
            if (mobileDropdownOpen) {
                dropdown.classList.add('open');
                btn.classList.add('active');
                icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                dropdown.classList.remove('open');
                btn.classList.remove('active');
                icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        }

        // 点击下拉项后自动关闭
        document.getElementById('mobileNavDropdown').addEventListener('click', function(e) {
            if (e.target.closest('.nav-item')) {
                toggleMobileDropdown();
            }
        });

        // 同步手机端管理员按钮（由 app.js 的 updateAdminButton 调用后触发）
        function syncMobileAdminButton() {
            const src = document.getElementById('adminButton');
            const dst = document.getElementById('adminButtonMobile');
            if (src && dst) dst.innerHTML = src.innerHTML;
        }

        // 监听窗口大小变化
        window.addEventListener('resize', initMobileHeader);
        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initMobileHeader();
        });
        // ===== 侧边栏拖拽缩放 =====
        (function() {
            const resizer = document.getElementById('sidebarResizer');
            const container = document.querySelector('.container');
            if (!resizer || !container) return;

            let startX, startWidth;

            resizer.addEventListener('mousedown', function(e) {
                startX = e.clientX;
                startWidth = parseInt(getComputedStyle(document.getElementById('navSidebar')).width);
                resizer.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';

                function onMouseMove(e) {
                    const delta = e.clientX - startX;
                    const newWidth = Math.min(400, Math.max(120, startWidth + delta));
                    container.style.gridTemplateColumns = newWidth + 'px 4px 1fr';
                }

                function onMouseUp() {
                    resizer.classList.remove('dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                e.preventDefault();
            });
        })();
    </script>
</body>
</html>
