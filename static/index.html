<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠游导航</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="toast.css">
</head>
<body>
    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 确认对话框 -->
    <div id="confirmDialog" class="confirm-dialog">
        <div class="confirm-content">
            <div class="confirm-title"></div>
            <div class="confirm-message"></div>
            <div class="confirm-buttons">
                <button class="confirm-button confirm-cancel">取消</button>
                <button class="confirm-button confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 目录导航 -->
        <div class="nav-sidebar" id="navSidebar">
            <div class="nav-title" id="navToggle" onclick="toggleNav()">
                悠游导航
                <i class="fas fa-chevron-up nav-toggle-icon" id="navToggleIcon"></i>
            </div>
            <div id="groupNav" class="nav-list"></div>
        </div>

        <!-- 拖拽分隔线 -->
        <div class="sidebar-resizer" id="sidebarResizer"></div>

        <!-- 主要内容区 -->
        <div class="main-content">
            <div class="page-header">
                <!-- 搜索栏和管理员按钮 -->
                <div class="header">
                    <form class="search-form" onsubmit="handleSearch(event)">
                        <div class="search-bar">
                            <div class="search-icon">
                                <i class="fas fa-search"></i>
                            </div>
                            <input type="text" id="searchInput" placeholder="搜索...">
                            <select id="searchEngine">
                                <option value="baidu">百度</option>
                                <option value="google">Google</option>
                                <option value="bing">Bing</option>
                            </select>
                        </div>
                    </form>
                    <div class="header-actions">
                        <a href="https://github.com/yvyan/MyPage" 
                           target="_blank" 
                           class="github-link" 
                           title="查看源码">
                            <i class="fab fa-github"></i>
                        </a>
                        <div id="adminButton">
                            <button class="admin-button" onclick="openAdminModal()">
                                <i class="fas fa-user-lock"></i>
                                管理员登录
                            </button>
                        </div>
                    </div>
                </div>
                <!-- 编辑模式操作栏（固定在搜索栏下方） -->
                <div id="adminControlsBar"></div>
            </div>

            <!-- 导航内容 -->
            <div id="navigation" class="navigation">
                <div class="loading">
                    <div class="loading-wave">
                        <div></div>
                        <div></div>
                    </div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理员登录模态框 -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAdminModal()"></span>
            <h2>管理员登录</h2>
            <form id="adminForm" onsubmit="handleLogin(event)">
                <input type="password" id="adminPassword" placeholder="请输入管理员密码" required>
                <button type="submit">登录</button>
            </form>
        </div>
    </div>

    <!-- 管理链接模态框 -->
    <div id="linkModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLinkModal()"></span>
            <h2>管理链接</h2>
            <form id="linkForm" onsubmit="handleLinkSubmit(event)">
                <input type="url" id="linkUrl" placeholder="链接地址" required>
                <input type="text" id="linkName" placeholder="链接名称" required>
                <input type="text" id="linkLogo" placeholder="图标地址">
                <textarea id="linkDescription" placeholder="链接描述"></textarea>
                <select id="linkGroup" required>
                    <option value="">选择分组...</option>
                </select>
                <button type="submit">保存</button>
            </form>
        </div>
    </div>

    <!-- 管理分组模态框 -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGroupModal()"></span>
            <h2>管理分组</h2>
            <form id="groupForm" onsubmit="handleGroupSubmit(event)">
                <input type="text" id="groupName" placeholder="分组名称" required>
                <div style="display:flex;gap:10px;margin-bottom:10px;">
                    <div style="flex:1">
                        <div style="font-size:12px;color:#718096;margin-bottom:4px;">分组颜色</div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <input type="color" id="groupColor" value="#4299e1" style="width:44px;height:36px;padding:2px;border:2px solid #e2e8f0;border-radius:6px;cursor:pointer;background:#f8fafc;">
                            <div id="colorPresets" style="display:flex;gap:4px;flex-wrap:wrap;">
                                <span class="color-preset" style="background:#4299e1" onclick="document.getElementById('groupColor').value='#4299e1'"></span>
                                <span class="color-preset" style="background:#48bb78" onclick="document.getElementById('groupColor').value='#48bb78'"></span>
                                <span class="color-preset" style="background:#ed8936" onclick="document.getElementById('groupColor').value='#ed8936'"></span>
                                <span class="color-preset" style="background:#e53e3e" onclick="document.getElementById('groupColor').value='#e53e3e'"></span>
                                <span class="color-preset" style="background:#9f7aea" onclick="document.getElementById('groupColor').value='#9f7aea'"></span>
                                <span class="color-preset" style="background:#38b2ac" onclick="document.getElementById('groupColor').value='#38b2ac'"></span>
                                <span class="color-preset" style="background:#ed64a6" onclick="document.getElementById('groupColor').value='#ed64a6'"></span>
                                <span class="color-preset" style="background:#667eea" onclick="document.getElementById('groupColor').value='#667eea'"></span>
                            </div>
                        </div>
                    </div>
                    <div style="flex:1">
                        <div style="font-size:12px;color:#718096;margin-bottom:4px;">分组图标（Emoji）</div>
                        <input type="text" id="groupIcon" placeholder="如 📁 🔖 ⭐ 🚀" style="margin-bottom:0;">
                    </div>
                </div>
                <label>
                    <input type="checkbox" id="groupPrivate">
                    私密分组
                </label>
                <button type="submit">保存</button>
            </form>
        </div>
    </div>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">
        <i class="fas fa-chevron-up"></i>
    </button>

    <!-- 快速添加书签浮动按钮 -->
    <button class="quick-add-btn" id="quickAddBtn" onclick="openQuickAdd()" title="快速添加书签" style="display:none;">
        <i class="fas fa-plus"></i>
    </button>

    <!-- 快速添加书签模态框 -->
    <div id="quickAddModal" class="modal">
        <div class="modal-content" style="max-width:480px;">
            <span class="close" onclick="closeQuickAdd()"></span>
            <h2><i class="fas fa-bookmark" style="color:#4299e1;margin-right:8px;"></i>快速添加书签</h2>
            <input type="url" id="quickAddUrl" placeholder="网址（粘贴后自动获取信息）" onblur="quickAddFetchInfo()">
            <div id="quickAddInfo" style="display:none;font-size:12px;color:#718096;margin:-6px 0 8px;padding:6px 10px;background:#f7fafc;border-radius:6px;"></div>
            <input type="text" id="quickAddName" placeholder="名称">
            <input type="text" id="quickAddLogo" placeholder="图标地址（可留空自动获取）">
            <textarea id="quickAddDesc" placeholder="描述（可留空）" style="min-height:60px;"></textarea>
            <select id="quickAddGroup" required>
                <option value="">选择分组...</option>
            </select>
            <button id="quickAddSubmitBtn" onclick="handleQuickAdd()" style="width:100%;padding:11px;background:linear-gradient(135deg,#4299e1,#3182ce);color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:500;margin-top:8px;">
                <i class="fas fa-plus"></i> 添加书签
            </button>
        </div>
    </div>

    <!-- 手机端固定顶栏 -->
    <div class="mobile-fixed-header" id="mobileFixedHeader" style="display:none;">
        <form class="search-form" onsubmit="handleSearch(event)">
            <div class="search-bar">
                <div class="search-icon"><i class="fas fa-search"></i></div>
                <input type="text" id="searchInputMobile" placeholder="搜索...">
                <select id="searchEngineMobile">
                    <option value="baidu">百度</option>
                    <option value="google">Google</option>
                    <option value="bing">Bing</option>
                </select>
            </div>
        </form>
        <div class="mobile-header-row2">
            <button class="mobile-nav-btn" id="mobileNavBtn" onclick="toggleMobileDropdown()">
                <i class="fas fa-list"></i> 悠游导航 <i class="fas fa-chevron-down" id="mobileDropdownIcon"></i>
            </button>
            <div class="header-actions">
                <div id="adminButtonMobile"></div>
            </div>
        </div>
    </div>

    <!-- 手机端目录下拉面板 -->
    <div class="mobile-nav-dropdown" id="mobileNavDropdown"></div>

    <!-- 批量添加链接模态框 -->
    <div id="batchAddModal" class="modal">
        <div class="modal-content" style="max-width:580px;">
            <span class="close" onclick="closeBatchAdd()"></span>
            <h2><i class="fas fa-layer-group" style="color:#4299e1;margin-right:8px;"></i>批量添加链接</h2>
            <select id="batchAddGroup" style="width:100%;padding:10px;margin-bottom:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;background:#f8fafc;">
                <option value="">选择目标分组...</option>
            </select>
            <textarea id="batchUrls" placeholder="每行输入一个URL，例如：&#10;https://www.google.com&#10;https://github.com&#10;https://www.youtube.com" style="width:100%;min-height:150px;padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:monospace;background:#f8fafc;resize:vertical;margin-bottom:10px;"></textarea>
            <div id="batchProgress" style="display:none;margin-bottom:10px;">
                <div style="background:#e2e8f0;border-radius:4px;height:8px;overflow:hidden;">
                    <div id="batchProgressFill" style="height:100%;background:#4299e1;width:0%;transition:width 0.3s;"></div>
                </div>
                <div id="batchProgressText" style="font-size:12px;color:#718096;margin-top:4px;"></div>
            </div>
            <div id="batchResults" style="max-height:200px;overflow-y:auto;margin-bottom:10px;font-size:13px;"></div>
            <button id="batchSubmitBtn" onclick="handleBatchAdd()" style="width:100%;padding:11px;background:linear-gradient(135deg,#4299e1,#3182ce);color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:500;">
                <i class="fas fa-rocket"></i> 开始抓取并添加
            </button>
        </div>
    </div>

    <!-- 链接失效检测模态框 -->
    <div id="checkLinksModal" class="modal">
        <div class="modal-content" style="max-width:580px;">
            <span class="close" onclick="closeCheckLinks()"></span>
            <h2><i class="fas fa-heartbeat" style="color:#4299e1;margin-right:8px;"></i>链接失效检测</h2>
            <p style="font-size:13px;color:#718096;margin-bottom:12px;">将逐一检测所有链接的可访问性，链接较多时需要一定时间。</p>
            <div id="checkLinksProgress" style="display:none;margin-bottom:10px;">
                <div style="background:#e2e8f0;border-radius:4px;height:8px;overflow:hidden;">
                    <div id="checkProgressFill" style="height:100%;background:#4299e1;width:0%;transition:width 0.3s;"></div>
                </div>
                <div id="checkProgressText" style="font-size:12px;color:#718096;margin-top:4px;"></div>
            </div>
            <div id="checkLinksResults" style="max-height:300px;overflow-y:auto;margin-bottom:12px;font-size:13px;"></div>
            <button id="checkLinksStartBtn" onclick="startCheckLinks()" style="width:100%;padding:11px;background:linear-gradient(135deg,#4299e1,#3182ce);color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:500;">
                <i class="fas fa-play"></i> 开始检测
            </button>
        </div>
    </div>


    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
        // ===== 回到顶部 =====
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });

        // ===== 桌面端侧边栏折叠 =====
        let navCollapsed = false;
        function toggleNav() {
            navCollapsed = !navCollapsed;
            const list = document.getElementById('groupNav');
            const icon = document.getElementById('navToggleIcon');
            if (navCollapsed) {
                list.style.display = 'none';
                icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            } else {
                list.style.display = 'flex';
                icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            }
        }

        // ===== 手机端固定顶栏 =====
        const mobileFixedHeader = document.getElementById('mobileFixedHeader');
        const isMobile = () => window.innerWidth <= 768;

        function initMobileHeader() {
            if (isMobile()) {
                mobileFixedHeader.style.display = 'block';
                // 同步搜索引擎选择
                const engine = localStorage.getItem('preferred_search_engine') || 'bing';
                document.getElementById('searchEngineMobile').value = engine;
                // 撑开内容区，避免被固定顶栏遮挡
                const h = mobileFixedHeader.offsetHeight;
                document.querySelector('.container').style.paddingTop = (h + 10) + 'px';
                // 目录下拉面板 top
                document.getElementById('mobileNavDropdown').style.top = h + 'px';
                // 同步管理员按钮
                syncMobileAdminButton();
            } else {
                mobileFixedHeader.style.display = 'none';
                document.querySelector('.container').style.paddingTop = '';
            }
        }

        // 手机端搜索表单提交（复用桌面端 handleSearch，但读取手机端输入框）
        document.querySelector('.mobile-fixed-header .search-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const SEARCH_ENGINES = {
                baidu: 'https://www.baidu.com/s?wd=',
                google: 'https://www.google.com/search?q=',
                bing: 'https://www.bing.com/search?q='
            };
            const q = document.getElementById('searchInputMobile').value.trim();
            const eng = document.getElementById('searchEngineMobile').value;
            if (q) window.open(SEARCH_ENGINES[eng] + encodeURIComponent(q), '_blank');
            localStorage.setItem('preferred_search_engine', eng);
        });

        // 手机端目录下拉
        let mobileDropdownOpen = false;
        function toggleMobileDropdown() {
            mobileDropdownOpen = !mobileDropdownOpen;
            const dropdown = document.getElementById('mobileNavDropdown');
            const btn = document.getElementById('mobileNavBtn');
            const icon = document.getElementById('mobileDropdownIcon');
            if (mobileDropdownOpen) {
                dropdown.classList.add('open');
                btn.classList.add('active');
                icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                dropdown.classList.remove('open');
                btn.classList.remove('active');
                icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        }

        // 点击下拉项后自动关闭
        document.getElementById('mobileNavDropdown').addEventListener('click', function(e) {
            if (e.target.closest('.nav-item')) {
                toggleMobileDropdown();
            }
        });

        // 同步手机端管理员按钮（由 app.js 的 updateAdminButton 调用后触发）
        function syncMobileAdminButton() {
            const src = document.getElementById('adminButton');
            const dst = document.getElementById('adminButtonMobile');
            if (src && dst) dst.innerHTML = src.innerHTML;
        }

        // 监听窗口大小变化
        window.addEventListener('resize', initMobileHeader);
        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initMobileHeader();
        });
        // ===== 侧边栏拖拽缩放 =====
        (function() {
            const resizer = document.getElementById('sidebarResizer');
            const container = document.querySelector('.container');
            if (!resizer || !container) return;

            let startX, startWidth;

            resizer.addEventListener('mousedown', function(e) {
                startX = e.clientX;
                startWidth = parseInt(getComputedStyle(document.getElementById('navSidebar')).width);
                resizer.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';

                function onMouseMove(e) {
                    const delta = e.clientX - startX;
                    const newWidth = Math.min(400, Math.max(120, startWidth + delta));
                    container.style.gridTemplateColumns = newWidth + 'px 4px 1fr';
                }

                function onMouseUp() {
                    resizer.classList.remove('dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                e.preventDefault();
            });
        })();
    </script>
</body>
</html>
