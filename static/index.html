<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠游导航</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="toast.css">
</head>
<body>
    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 确认对话框 -->
    <div id="confirmDialog" class="confirm-dialog">
        <div class="confirm-content">
            <div class="confirm-title"></div>
            <div class="confirm-message"></div>
            <div class="confirm-buttons">
                <button class="confirm-button confirm-cancel">取消</button>
                <button class="confirm-button confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 目录导航 -->
        <div class="nav-sidebar" id="navSidebar">
            <div class="nav-title" id="navToggle" onclick="toggleNav()">
                悠游导航
                <i class="fas fa-chevron-up nav-toggle-icon" id="navToggleIcon"></i>
            </div>
            <div id="groupNav" class="nav-list"></div>
        </div>

        <!-- 主要内容区 -->
        <div class="main-content">
            <div class="page-header">
                <!-- 搜索栏和管理员按钮 -->
                <div class="header">
                    <form class="search-form" onsubmit="handleSearch(event)">
                        <div class="search-bar">
                            <div class="search-icon">
                                <i class="fas fa-search"></i>
                            </div>
                            <input type="text" id="searchInput" placeholder="搜索...">
                            <select id="searchEngine">
                                <option value="baidu">百度</option>
                                <option value="google">Google</option>
                                <option value="bing">Bing</option>
                            </select>
                        </div>
                    </form>
                    <div class="header-actions">
                        <a href="https://github.com/yvyan/MyPage" 
                           target="_blank" 
                           class="github-link" 
                           title="查看源码">
                            <i class="fab fa-github"></i>
                        </a>
                        <div id="adminButton">
                            <button class="admin-button" onclick="openAdminModal()">
                                <i class="fas fa-user-lock"></i>
                                管理员登录
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 手机端折叠目录 -->
            <div class="mobile-nav" id="mobileNav">
                <div class="mobile-nav-title" onclick="toggleMobileNav()">
                    <span><i class="fas fa-list"></i> 悠游导航</span>
                    <i class="fas fa-chevron-down mobile-nav-icon" id="mobileNavIcon"></i>
                </div>
                <div class="mobile-nav-list" id="mobileNavList"></div>
            </div>

            <!-- 导航内容 -->
            <div id="navigation" class="navigation">
                <div class="loading">
                    <div class="loading-wave">
                        <div></div>
                        <div></div>
                    </div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理员登录模态框 -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAdminModal()"></span>
            <h2>管理员登录</h2>
            <form id="adminForm" onsubmit="handleLogin(event)">
                <input type="password" id="adminPassword" placeholder="请输入管理员密码" required>
                <button type="submit">登录</button>
            </form>
        </div>
    </div>

    <!-- 管理链接模态框 -->
    <div id="linkModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLinkModal()"></span>
            <h2>管理链接</h2>
            <form id="linkForm" onsubmit="handleLinkSubmit(event)">
                <input type="url" id="linkUrl" placeholder="链接地址" required>
                <input type="text" id="linkName" placeholder="链接名称" required>
                <input type="text" id="linkLogo" placeholder="图标地址">
                <textarea id="linkDescription" placeholder="链接描述"></textarea>
                <select id="linkGroup" required>
                    <option value="">选择分组...</option>
                </select>
                <button type="submit">保存</button>
            </form>
        </div>
    </div>

    <!-- 管理分组模态框 -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGroupModal()"></span>
            <h2>管理分组</h2>
            <form id="groupForm" onsubmit="handleGroupSubmit(event)">
                <input type="text" id="groupName" placeholder="分组名称" required>
                <label>
                    <input type="checkbox" id="groupPrivate">
                    私密分组
                </label>
                <button type="submit">保存</button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
        // 桌面端侧边栏折叠
        let navCollapsed = false;
        function toggleNav() {
            navCollapsed = !navCollapsed;
            const list = document.getElementById('groupNav');
            const icon = document.getElementById('navToggleIcon');
            if (navCollapsed) {
                list.style.display = 'none';
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            } else {
                list.style.display = 'flex';
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
            }
        }

        // 手机端目录折叠
        let mobileNavOpen = false;
        function toggleMobileNav() {
            mobileNavOpen = !mobileNavOpen;
            const list = document.getElementById('mobileNavList');
            const icon = document.getElementById('mobileNavIcon');
            if (mobileNavOpen) {
                list.style.maxHeight = list.scrollHeight + 'px';
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
            } else {
                list.style.maxHeight = '0';
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            }
        }
    </script>
</body>
</html>
